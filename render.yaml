services:
  - type: web
    name: private-desktop
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npm run db:migrate
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        fromDatabase:
          name: private-desktop-db
          property: connectionString
      # Kimi OAuth is optional - local auth works without it
      - key: APP_ID
        value: ""
      - key: APP_SECRET
        value: ""
      - key: KIMI_AUTH_URL
        value: ""
      - key: KIMI_OPEN_URL
        value: ""

databases:
  - name: private-desktop-db
    plan: free
    databaseName: private_desktop
    user: private_desktop
