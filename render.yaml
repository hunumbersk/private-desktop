services:
  - type: web
    name: private-desktop
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Supabase PostgreSQL
      # Format: postgresql://postgres:[password]@db.pgkgkvvgfxmxtbhcdyhj.supabase.co:5432/postgres
      - key: DATABASE_URL
        sync: false
      # Kimi OAuth optional
      - key: APP_ID
        value: ""
      - key: APP_SECRET
        value: ""
      - key: KIMI_AUTH_URL
        value: ""
      - key: KIMI_OPEN_URL
        value: ""
