services:
  - type: web
    name: private-desktop
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Turso SQLite database - persistent across deploys
      - key: DATABASE_URL
        value: libsql://private-desktop-sxd2215.turso.io
      # Get token: turso db tokens create private-desktop
      - key: DATABASE_AUTH_TOKEN
        sync: false
      # Kimi OAuth optional
      - key: APP_ID
        value: ""
      - key: APP_SECRET
        value: ""
      - key: KIMI_AUTH_URL
        value: ""
      - key: KIMI_OPEN_URL
        value: ""
