services:
  - type: web
    name: private-desktop
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # SQLite file DB - data persists during instance lifetime
      # For persistent storage, upgrade to paid plan or use Turso
      - key: DATABASE_URL
        value: file:./data/app.db
      # Kimi OAuth optional
      - key: APP_ID
        value: ""
      - key: APP_SECRET
        value: ""
      - key: KIMI_AUTH_URL
        value: ""
      - key: KIMI_OPEN_URL
        value: ""
